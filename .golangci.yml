version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - revive
    - gocyclo
    - misspell
  settings:
    errcheck:
      # CLI write paths: a failing stdout/stderr write is not actionable
      # (the user has closed the pipe). Skip them rather than littering the
      # code with `_ =`.
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintln
        - fmt.Fprintf
    gocyclo:
      min-complexity: 15
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gocyclo
          - errcheck
      # The i18n catalog holds French strings; the English-only misspell
      # linter false-positives on words like "Récurrence".
      - path: internal/i18n/
        linters:
          - misspell

formatters:
  enable:
    - gofmt
    - goimports
