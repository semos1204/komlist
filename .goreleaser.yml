version: 2

project_name: kl

before:
  hooks:
    - go mod tidy

builds:
  - id: kl
    main: ./cmd/kl
    binary: kl
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - id: kl
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-dev+{{ .ShortCommit }}"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  draft: false
  prerelease: auto

# Homebrew tap publishing.
#
# One-time setup:
#   1. Create an empty GitHub repo named "homebrew-tap" under your account
#      (or org). The exact name matters: `brew tap` looks for "homebrew-*".
#   2. Generate a Personal Access Token with "repo" scope.
#   3. Add it as a secret named HOMEBREW_TAP_GITHUB_TOKEN on the komlist
#      repository (Settings → Secrets and variables → Actions).
#   4. Replace `semos1204` below with your handle.
#
# Without the token, this block is skipped — the release still ships the
# raw binaries on GitHub Releases, just without the Homebrew formula.
brews:
  - name: kl
    skip_upload: '{{ if eq .Env.HOMEBREW_TAP_GITHUB_TOKEN "" }}true{{ end }}'
    repository:
      owner: semos1204
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/semos1204/komlist"
    description: "A small command-line task manager"
    license: "MIT"
    test: |
      system "#{bin}/kl", "--version"
    install: |
      bin.install "kl"
